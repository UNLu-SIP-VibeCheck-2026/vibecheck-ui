<div class="register-page">
    <div class="register-header">
        <h1 class="brand-title">Registrate</h1>
    </div>

    <mat-card class="register-card">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            
            <div class="form-group custom-field-wrapper">
                <label for="username">Nombre de Usuario</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="text" id="username" formControlName="username">
                    <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
                        El nombre de usuario es requerido
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="password">Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="password" id="password" formControlName="password">
                    <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
                        La contraseña es requerida
                    </mat-error>
                    <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
                        Mínimo 8 caracteres
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="repeatPassword">Repetir Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="password" id="repeatPassword" formControlName="repeatPassword">
                    <mat-error *ngIf="registerForm.get('repeatPassword')?.hasError('required')">
                        Debe repetir la contraseña
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="email">Correo Electrónico</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="email" id="email" formControlName="email">
                    <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
                        El correo es requerido
                    </mat-error>
                    <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
                        Email inválido
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="phoneNumber">Teléfono</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="tel" id="phoneNumber" formControlName="phoneNumber" placeholder="+54 9 11 1234 5678">
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label>Fecha de Nacimiento</label>
                <div class="multi-input-row">
                    <mat-form-field appearance="outline" class="custom-mat-form-field small">
                        <input matInput type="number" formControlName="birthDay" placeholder="DD">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="custom-mat-form-field small">
                        <input matInput type="number" formControlName="birthMonth" placeholder="MM">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="custom-mat-form-field medium">
                        <input matInput type="number" formControlName="birthYear" placeholder="AAAA">
                    </mat-form-field>
                </div>
            </div>

            <div class="form-group custom-field-wrapper">
                <label>Nombre y Apellido</label>
                <div class="multi-input-row">
                    <mat-form-field appearance="outline" class="custom-mat-form-field half">
                        <input matInput type="text" formControlName="name" placeholder="Nombre">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="custom-mat-form-field half">
                        <input matInput type="text" formControlName="lastName" placeholder="Apellido">
                    </mat-form-field>
                </div>
            </div>


            <mat-error *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('repeatPassword')?.touched" style="margin-bottom: 8px; font-size: 13px;">
                Las contraseñas no coinciden
            </mat-error>

            <button mat-raised-button
                    type="submit"
                    [disabled]="isSubmitting || registerForm.invalid"
                    class="custom-btn-submit">
                {{ isSubmitting ? 'Registrando...' : 'Registrarse' }}
            </button>

            <div class="divider-container">
                <span class="divider-line"></span>
                <span class="divider-text">o registrarte con</span>
                <span class="divider-line"></span>
            </div>

            <div class="social-login-container">
                <button mat-stroked-button
                        type="button"
                        (click)="loginWithGoogle()"
                        class="social-btn">
                    <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google Logo" class="social-logo">
                    Google
                </button>
                
                <button mat-stroked-button
                        type="button"
                        (click)="loginWithGitHub()"
                        class="social-btn">
                    <svg class="social-logo" height="24" viewBox="0 0 16 16" version="1.1" width="24" aria-hidden="true"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                    GitHub
                </button>
            </div>

        </form>
    </mat-card>
</div>
