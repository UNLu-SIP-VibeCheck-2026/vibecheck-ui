<div class="register-page">
    <div class="register-header">
        <h1 class="brand-title">Registrate</h1>
    </div>

    <mat-card class="register-card">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            
            <div class="form-group custom-field-wrapper">
                <label for="username">Nombre de Usuario</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="text" id="username" formControlName="username">
                    <mat-error *ngIf="registerForm.get('username')?.hasError('required')">
                        El nombre de usuario es requerido
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="password">Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="password" id="password" formControlName="password">
                    <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
                        La contraseña es requerida
                    </mat-error>
                    <mat-error *ngIf="registerForm.get('password')?.hasError('minlength')">
                        Mínimo 8 caracteres
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="repeatPassword">Repetir Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="password" id="repeatPassword" formControlName="repeatPassword">
                    <mat-error *ngIf="registerForm.get('repeatPassword')?.hasError('required')">
                        Debe repetir la contraseña
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="email">Correo Electrónico</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="email" id="email" formControlName="email">
                    <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
                        El correo es requerido
                    </mat-error>
                    <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
                        Email inválido
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="phoneNumber">Teléfono</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="tel" id="phoneNumber" formControlName="phoneNumber" placeholder="+54 9 11 1234 5678">
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label>Fecha de Nacimiento</label>
                <div class="multi-input-row">
                    <mat-form-field appearance="outline" class="custom-mat-form-field small">
                        <input matInput type="number" formControlName="birthDay" placeholder="DD">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="custom-mat-form-field small">
                        <input matInput type="number" formControlName="birthMonth" placeholder="MM">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="custom-mat-form-field medium">
                        <input matInput type="number" formControlName="birthYear" placeholder="AAAA">
                    </mat-form-field>
                </div>
            </div>

            <div class="form-group custom-field-wrapper">
                <label>Nombre y Apellido</label>
                <div class="multi-input-row">
                    <mat-form-field appearance="outline" class="custom-mat-form-field half">
                        <input matInput type="text" formControlName="name" placeholder="Nombre">
                    </mat-form-field>
                    <mat-form-field appearance="outline" class="custom-mat-form-field half">
                        <input matInput type="text" formControlName="lastName" placeholder="Apellido">
                    </mat-form-field>
                </div>
            </div>

            <div class="form-group custom-field-wrapper role-selection">
                <label>En VibeCheck quiero:</label>
                <div class="role-buttons">
                    <button type="button" 
                            class="role-btn" 
                            [class.active]="registerForm.get('role')?.value === 'comprar'"
                            (click)="setRole('comprar')">
                        Comprar entradas
                    </button>
                    <button type="button" 
                            class="role-btn" 
                            [class.active]="registerForm.get('role')?.value === 'crear'"
                            (click)="setRole('crear')">
                        Crear Eventos
                    </button>
                    <button type="button" 
                            class="role-btn" 
                            [class.active]="registerForm.get('role')?.value === 'validar'"
                            (click)="setRole('validar')">
                        Validar entradas en puerta
                    </button>
                </div>
                <mat-error *ngIf="registerForm.hasError('passwordMismatch') && registerForm.get('repeatPassword')?.touched" style="margin-top: 8px; font-size: 13px;">
                    Las contraseñas no coinciden
                </mat-error>
            </div>

            <button mat-raised-button
                    type="submit"
                    [disabled]="isSubmitting || registerForm.invalid"
                    class="custom-btn-submit">
                {{ isSubmitting ? 'Registrando...' : 'Registrarse' }}
            </button>

        </form>
    </mat-card>
</div>
