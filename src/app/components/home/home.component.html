<div class="home-container">
    <div class="hero-section">
        <h1 class="brand-title">VibeCheck</h1>
        
        <div class="hero-actions">
            <button mat-raised-button 
                    class="custom-btn-submit" 
                    (click)="navigateToLogin()">
                Iniciar Sesión
            </button>
            <button mat-raised-button 
                    class="custom-btn-submit" 
                    (click)="navigateToRegister()">
                Registrarse
            </button>
        </div>

        <div class="hero-footer">
            <a class="recovery-link" (click)="navigateToRecovery()">
                Olvidé mi contraseña
            </a>
        </div>

        <!-- Temporary Dev Actions -->
        <div class="dev-actions">
            <button mat-raised-button 
                    class="dev-btn" 
                    (click)="navigateToUserProfile()">
                Perfil Usuario
            </button>
            <button mat-raised-button 
                    class="dev-btn" 
                    (click)="navigateToAdminUsers()">
                Administrar Usuarios
            </button>
            <button mat-raised-button 
                    class="dev-btn" 
                    (click)="navigateToAdminRoles()">
                Administrar Roles
            </button>
            <button mat-raised-button 
                    class="dev-btn" 
                    (click)="navigateToAdminPermissions()">
                Administrar Permisos
            </button>
        </div>
    </div>
</div>
