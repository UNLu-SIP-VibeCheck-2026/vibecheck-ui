<div class="login-page">
    <div class="login-header">
        <h1 class="brand-title">VibeCheck</h1>
        <h2 class="page-subtitle">Accedé a tu cuenta</h2>
    </div>

    <mat-card class="login-card">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="form-group custom-field-wrapper">
                <label for="username">Usuario o Correo Electrónico</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput
                           type="text"
                           id="username"
                           formControlName="username"
                           placeholder="usuario o ejemplo@correo.com">
                    <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
                        El usuario o correo es requerido
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="password">Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput
                           type="password"
                           id="password"
                           formControlName="password">
                    <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
                        La contraseña es requerida
                    </mat-error>
                    <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
                        La contraseña debe tener al menos 6 caracteres
                    </mat-error>
                </mat-form-field>
            </div>

            <button mat-raised-button
                    type="submit"
                    [disabled]="isSubmitting || loginForm.invalid"
                    class="custom-btn-submit">
                {{ isSubmitting ? 'Ingresando...' : 'Ingresar' }}
            </button>

            <div class="divider-container">
                <span class="divider-line"></span>
                <span class="divider-text">o continuar con</span>
                <span class="divider-line"></span>
            </div>

            <button mat-stroked-button
                    type="button"
                    (click)="loginWithGoogle()"
                    class="google-btn">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/24px.svg" alt="Google Logo" class="google-logo">
                Google
            </button>

        </form>
    </mat-card>
</div>
