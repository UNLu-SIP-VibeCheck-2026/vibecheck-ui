<div class="recovery-page">
    <div class="recovery-header">
        <h1 class="brand-title">Cambiar Contraseña</h1>
        <p class="brand-subtitle">Actualizá tu credencial de acceso</p>
    </div>

    <mat-card class="recovery-card">
        <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()">
            
            <div class="form-group custom-field-wrapper" *ngIf="!recoveryForm.get('username')?.disabled">
                <label for="username">Nombre de Usuario</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="text" id="username" formControlName="username">
                    <mat-error *ngIf="recoveryForm.get('username')?.hasError('required')">
                        El nombre de usuario es requerido
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="oldPassword">Contraseña Actual</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="password" id="oldPassword" formControlName="oldPassword">
                    <mat-error *ngIf="recoveryForm.get('oldPassword')?.hasError('required')">
                        Es requerida tu contraseña actual
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="newPassword">Nueva Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="password" id="newPassword" formControlName="newPassword">
                    <mat-error *ngIf="recoveryForm.get('newPassword')?.hasError('required')">
                        La nueva contraseña es requerida
                    </mat-error>
                    <mat-error *ngIf="recoveryForm.get('newPassword')?.hasError('minlength')">
                        Mínimo 8 caracteres
                    </mat-error>
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field">
                    <input matInput type="password" id="confirmPassword" formControlName="confirmPassword">
                    <mat-error *ngIf="recoveryForm.get('confirmPassword')?.hasError('required')">
                        Requerida
                    </mat-error>
                    <mat-error *ngIf="recoveryForm.hasError('mismatch') && !recoveryForm.get('confirmPassword')?.hasError('required')">
                        Las contraseñas no coinciden
                    </mat-error>
                </mat-form-field>
            </div>

            <button mat-raised-button
                    type="submit"
                    [disabled]="isSubmitting || recoveryForm.invalid"
                    class="custom-btn-submit">
                {{ isSubmitting ? 'Cambiando...' : 'Cambiar Contraseña' }}
            </button>

        </form>
    </mat-card>
</div>
