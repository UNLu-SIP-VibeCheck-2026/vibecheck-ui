<div class="admin-container">
    <div class="header-section">
        <h1 class="main-title">Logs de Auditoría</h1>
    </div>

    <!-- Data Table Section -->
    <div class="table-container mat-elevation-z0">
        <table mat-table [dataSource]="dataSource" class="custom-table" matSort (matSortChange)="onSortChange($event)">
            
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
                <td mat-cell *matCellDef="let element"> {{element.id}} </td>
            </ng-container>

            <ng-container matColumnDef="fecha">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Fecha </th>
                <td mat-cell *matCellDef="let element"> {{element.fecha | date:'dd/MM/yyyy HH:mm:ss'}} </td>
            </ng-container>

            <ng-container matColumnDef="usuarioDb">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Usuario DB </th>
                <td mat-cell *matCellDef="let element"> {{element.usuarioDb}} </td>
            </ng-container>

            <ng-container matColumnDef="tabla">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Tabla </th>
                <td mat-cell *matCellDef="let element"> {{element.tabla}} </td>
            </ng-container>

            <ng-container matColumnDef="operacion">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Operación </th>
                <td mat-cell *matCellDef="let element">
                    <mat-chip class="custom-chip" [ngClass]="{
                        'insert-chip': element.operacion === 'INSERT',
                        'update-chip': element.operacion === 'UPDATE',
                        'delete-chip': element.operacion === 'DELETE'
                    }">
                        {{element.operacion}}
                    </mat-chip>
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> </th>
                <td mat-cell *matCellDef="let element" class="action-cell">
                    <div class="action-buttons-wrapper">
                        <button mat-icon-button class="circle-btn view" (click)="viewDetail(element); $event.stopPropagation()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <!-- Row shown when there is no matching data. -->
            <tr class="mat-row empty-state-row" *matNoDataRow>
                <td class="mat-cell empty-state-cell" [attr.colspan]="displayedColumns.length">
                    <div class="empty-state">
                        <mat-icon class="empty-icon">history</mat-icon>
                        <p class="empty-title">No hay logs registrados</p>
                    </div>
                </td>
            </tr>
        </table>

        <mat-paginator [length]="totalElements"
                       [pageSize]="pageSize"
                       [pageIndex]="pageIndex"
                       [pageSizeOptions]="[5, 10, 25, 100]"
                       (page)="onPageChange($event)"
                       aria-label="Select page">
        </mat-paginator>
    </div>
</div>
