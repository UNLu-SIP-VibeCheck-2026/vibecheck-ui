<div class="admin-container">
    <div class="header-section">
        <h1 class="main-title">Administrar Roles</h1>
    </div>

    <!-- Actions Row -->
    <div class="actions-row">
        <button mat-raised-button class="btn-add" (click)="addRole()">
            Agregar Rol
        </button>
    </div>

    <!-- Roles Table Section -->
    <div class="table-container mat-elevation-z0">
        <table mat-table [dataSource]="dataSource" class="custom-table">

            <!-- Role Column -->
            <ng-container matColumnDef="roleName">
                <th mat-header-cell *matHeaderCellDef> Rol </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <!-- Permissions Column -->
            <ng-container matColumnDef="permissions">
                <th mat-header-cell *matHeaderCellDef> Permiso(s) </th>
                <td mat-cell *matCellDef="let element"> 
                    <mat-chip-set *ngIf="element.permissions?.length > 0; else noPerms">
                        <mat-chip *ngFor="let p of element.permissions" class="table-chip">
                            {{p.name}}
                        </mat-chip>
                    </mat-chip-set>
                    <ng-template #noPerms>
                        <span class="text-muted" style="color: #888; font-style: italic;">Sin permisos</span>
                    </ng-template>
                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> </th>
                <td mat-cell *matCellDef="let element" class="action-cell">
                    <div class="action-buttons-wrapper">
                        <button mat-icon-button class="circle-btn edit" (click)="editRole(element); $event.stopPropagation()">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button class="circle-btn delete" (click)="deleteRole(element); $event.stopPropagation()">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;">
            </tr>
        </table>

        <!-- Paginator -->
        <mat-paginator 
            [length]="totalElements"
            [pageSize]="pageSize"
            [pageSizeOptions]="[5, 10, 25, 100]"
            [pageIndex]="pageIndex"
            (page)="onPageChange($event)"
            showFirstLastButtons>
        </mat-paginator>
    </div>
</div>
