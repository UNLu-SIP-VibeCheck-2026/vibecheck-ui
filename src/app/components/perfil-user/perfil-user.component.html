<div class="profile-page">

  <!-- Estado de carga -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="skeleton-avatar"></div>
    <div class="skeleton-line wide"></div>
    <div class="skeleton-line narrow"></div>
  </div>

  <!-- Estado de error -->
  <div class="error-state" *ngIf="!isLoading && hasError">
    <div class="error-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 8V12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="16" r="0.75" fill="currentColor"/>
      </svg>
    </div>
    <p class="error-title">Usuario no encontrado</p>
    <p class="error-subtitle">El perfil que buscás no existe o no está disponible.</p>
  </div>

  <!-- Contenido del perfil -->
  <div class="profile-content" *ngIf="!isLoading && !hasError && profile">

    <!-- Avatar con iniciales -->
    <div class="avatar-wrapper">
      <div class="avatar">{{ initials }}</div>
    </div>

    <!-- Identidad -->
    <div class="identity-section">
      <h1 class="display-name">{{ fullName }}</h1>
      <p class="username">&#64;{{ profile.username }}</p>
    </div>

    <!-- Datos públicos -->
    <div class="info-cards">

      <div class="info-card">
        <span class="info-label">Rol</span>
        <span class="info-value role-badge">{{ profile.role }}</span>
      </div>

    </div>

  </div>

</div>
