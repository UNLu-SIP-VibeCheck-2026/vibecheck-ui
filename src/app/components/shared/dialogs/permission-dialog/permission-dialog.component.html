<div class="permission-dialog-container">
    <form [formGroup]="permissionForm" (ngSubmit)="onSubmit()">
        
        <!-- Nombre (clave: recurso:accion) -->
        <div class="form-group custom-field-wrapper">
            <label for="name">Nombre <span class="hint">(formato: recurso:accion)</span></label>
            <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                <input matInput id="name" formControlName="name" placeholder="ej: user:create">
            </mat-form-field>
            <mat-error *ngIf="permissionForm.get('name')?.hasError('pattern') && permissionForm.get('name')?.touched">
                Formato inválido. Debe ser <strong>recurso:accion</strong> en minúsculas (ej: user:create)
            </mat-error>
        </div>

        <!-- Descripción -->
        <div class="form-group custom-field-wrapper">
            <label for="description">Descripción</label>
            <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                <input matInput id="description" formControlName="description" placeholder="Descripción del permiso">
            </mat-form-field>
        </div>

        <div class="dialog-actions">
            <button mat-raised-button 
                    type="submit"
                    [disabled]="permissionForm.invalid"
                    class="btn-submit">
                {{ isEditMode ? 'Modificar Permiso' : 'Crear Permiso' }}
            </button>
            <button mat-stroked-button 
                    type="button"
                    (click)="onCancel()"
                    class="btn-cancel">
                Cancelar
            </button>
        </div>

    </form>
</div>
