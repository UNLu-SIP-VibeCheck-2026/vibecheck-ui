<div class="user-dialog-container">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group custom-field-wrapper">
            <label for="username">Nombre de Usuario</label>
            <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                <input matInput id="username" formControlName="username">
            </mat-form-field>
        </div>

        <ng-container *ngIf="!isEditMode">
            <div class="form-group custom-field-wrapper">
                <label for="password">Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                    <input matInput type="password" id="password" formControlName="password">
                </mat-form-field>
            </div>

            <div class="form-group custom-field-wrapper">
                <label for="confirmPassword">Repetir Contraseña</label>
                <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                    <input matInput type="password" id="confirmPassword" formControlName="confirmPassword">
                </mat-form-field>
                <mat-error *ngIf="userForm.hasError('passwordMismatch') && userForm.get('confirmPassword')?.touched">
                    Las contraseñas no coinciden
                </mat-error>
            </div>
        </ng-container>

        <div class="form-group custom-field-wrapper">
            <label for="email">Correo Electrónico</label>
            <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                <input matInput id="email" formControlName="email">
            </mat-form-field>
        </div>

        <div class="form-group custom-field-wrapper">
            <label for="phone">Teléfono</label>
            <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                <input matInput id="phone" formControlName="phone" placeholder="+54 9 11 1234 5678">
            </mat-form-field>
        </div>

        <div class="form-group custom-field-wrapper dob-section">
            <label>Fecha de Nacimiento</label>
            <div class="dob-inputs">
                <mat-form-field appearance="outline" class="dob-field" subscriptSizing="dynamic">
                    <input matInput formControlName="birthDay" placeholder="DD" type="number">
                </mat-form-field>
                <mat-form-field appearance="outline" class="dob-field" subscriptSizing="dynamic">
                    <input matInput formControlName="birthMonth" placeholder="MM" type="number">
                </mat-form-field>
                <mat-form-field appearance="outline" class="dob-field year" subscriptSizing="dynamic">
                    <input matInput formControlName="birthYear" placeholder="AAAA" type="number">
                </mat-form-field>
            </div>
        </div>

        <div class="form-group custom-field-wrapper">
            <label>Nombre y Apellido</label>
            <div class="stacked-inputs">
                <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                    <input matInput formControlName="firstName" placeholder="Nombre">
                </mat-form-field>
                <mat-form-field appearance="outline" class="custom-mat-form-field" subscriptSizing="dynamic">
                    <input matInput formControlName="lastName" placeholder="Apellido">
                </mat-form-field>
            </div>
        </div>

        <ng-container *ngIf="!isEditMode">
            <div class="form-group custom-field-wrapper">
                <label>Rol:</label>
                <mat-form-field appearance="fill" class="custom-mat-select" subscriptSizing="dynamic">
                    <mat-select formControlName="role" placeholder="Roles">
                        <mat-option *ngFor="let role of roles" [value]="role.value">
                            {{role.label}}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
        </ng-container>

        <ng-container *ngIf="isEditMode">
            <div class="form-group custom-field-wrapper">
                <label>Estado</label>
                <mat-form-field appearance="fill" class="custom-mat-select" subscriptSizing="dynamic">
                    <mat-select formControlName="active" placeholder="Estado">
                        <mat-option [value]="true">Activo</mat-option>
                        <mat-option [value]="false">Inactivo</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>
        </ng-container>

        <div class="dialog-actions">
            <button mat-raised-button 
                    type="submit"
                    [disabled]="userForm.invalid"
                    class="btn-submit">
                {{ isEditMode ? 'Modificar Usuario' : 'Crear Usuario' }}
            </button>
            <button mat-stroked-button 
                    type="button"
                    (click)="onCancel()"
                    class="btn-cancel">
                Cancelar
            </button>
        </div>

    </form>
</div>
