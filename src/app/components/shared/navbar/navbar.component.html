<nav class="navbar">
  <div class="logo-container" (click)="navigateToHome()">
    <div class="logo-icon">VC</div>
    <span class="logo-text">VibeCheck</span>
  </div>
  
  <div class="nav-actions">
    <ng-container *ngIf="user$ | async as user; else loggedOut">
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-btn">
        <mat-icon>account_circle</mat-icon>
        {{ user.username }}
        <mat-icon iconPositionEnd>arrow_drop_down</mat-icon>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="navigateToDashboard()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon color="warn">exit_to_app</mat-icon>
          <span style="color: red;">Cerrar sesión</span>
        </button>
      </mat-menu>
    </ng-container>

    <ng-template #loggedOut>
      <button class="btn-outline" (click)="navigateToLogin()">Iniciar sesión</button>
      <button class="btn-filled" (click)="navigateToRegister()">Registrarse</button>
    </ng-template>
  </div>
</nav>
